# =============================================================================
# LND Configuration — Dave (Research Node D / Extended Network)
# =============================================================================
# Dave is an additional node in the extended research network.
# Dave uses the Watchtower CLIENT to register with Alice's tower for
# fraud protection, similar to Bob and Carol.
#
# Topology:  Alice ──channel──► Bob ──channel──► Carol
#            Dave connections to be established in payment routing tests

[Application Options]
alias=Dave-Research
color=#FF00FF

# Listening ports (Dave — different host ports in docker-compose)
listen=0.0.0.0:9735
rpclisten=0.0.0.0:10009
restlisten=0.0.0.0:8080
restcors=*

# Data paths
datadir=/home/lnd/.lnd/data
logdir=/home/lnd/.lnd/logs
tlscertpath=/home/lnd/.lnd/tls.cert
tlskeypath=/home/lnd/.lnd/tls.key
tlsextradomain=lnd-dave
adminmacaroonpath=/home/lnd/.lnd/data/chain/bitcoin/regtest/admin.macaroon

# ---- Watchtower CLIENT (Dave registers with Alice's tower) -------------------
# The tower stores encrypted breach-remedy transactions (justice txs).
wtclient.active=true

# ---- Bitcoin Backend --------------------------------------------------------
[Bitcoin]
bitcoin.active=1
bitcoin.regtest=1
bitcoin.node=bitcoind

# ---- Bitcoind RPC Connection ------------------------------------------------
[Bitcoind]
bitcoind.rpchost=bitcoin-research:18443
bitcoind.rpcuser=bitcoinrpc
bitcoind.rpcpass=research_password
bitcoind.zmqpubrawblock=tcp://bitcoin-research:28332
bitcoind.zmqpubrawtx=tcp://bitcoin-research:28333

# ---- Routing ----------------------------------------------------------------
[Routing]
routing.assumechanvalid=true
