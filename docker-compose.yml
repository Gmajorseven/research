version: '3.9'

# =============================================================================
# Research Environment: Bitcoin (regtest) + 3 LND nodes + Watchtower
# =============================================================================
# Simulates a 3-node Lightning Network for studying:
#   - Multi-hop payment routing (Alice -> Bob -> Carol)
#   - Fraud prevention via LND built-in watchtower
#   - On-chain justice/penalty transaction mechanism
#
# Node topology:
#   Alice ──[channel]──► Bob ──[channel]──► Carol
#   Alice also hosts the Watchtower Server.
#   Bob and Carol register as Watchtower Clients.
#
# Usage:
#   docker compose -f docker-compose.research.yml up -d
#   Then follow scripts in research/scripts/
# =============================================================================

networks:
  research_net:
    driver: bridge
    name: research_net

volumes:
  research_bitcoin_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/bitcoin

  research_alice_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/alice

  research_bob_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/bob

  research_carol_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/carol

services:

  # ---------------------------------------------------------------------------
  # Bitcoin Core — Regtest
  # ---------------------------------------------------------------------------
  bitcoin-research:
    build:
      context: ./bitcoin
      dockerfile: Dockerfile
      args:
        BITCOIN_VERSION: ${BITCOIN_VERSION:-29.3}
    image: bitcoin-core:${BITCOIN_VERSION:-29.3}
    container_name: bitcoin-research
    restart: unless-stopped
    networks:
      - research_net
    ports:
      - "18443:18443"  # RPC (regtest)
      - "18444:18444"  # P2P (regtest)
      - "28332:28332"  # ZMQ rawblock
      - "28333:28333"  # ZMQ rawtx
    volumes:
      - research_bitcoin_data:/home/bitcoin/.bitcoin
      - ./bitcoin/bitcoin-regtest.conf:/home/bitcoin/.bitcoin/bitcoin.conf:ro
    environment:
      - BITCOIN_DATA=/home/bitcoin/.bitcoin
    command: >
      bitcoind
      -regtest
      -conf=/home/bitcoin/.bitcoin/bitcoin.conf
      -datadir=/home/bitcoin/.bitcoin
    healthcheck:
      test: ["CMD", "bitcoin-cli", "-regtest",
             "-rpcuser=bitcoinrpc",
             "-rpcpassword=research_password",
             "-rpcconnect=127.0.0.1",
             "getblockchaininfo"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # LND — Alice (Node A + Watchtower Server)
  # ---------------------------------------------------------------------------
  lnd-alice:
    build:
      context: ./lnd
      dockerfile: Dockerfile
      args:
        LND_VERSION: ${LND_VERSION:-v0.20.1-beta}
    image: lnd:${LND_VERSION:-v0.20.1-beta}
    container_name: lnd-alice
    restart: unless-stopped
    depends_on:
      bitcoin-research:
        condition: service_healthy
    networks:
      - research_net
    ports:
      - "9835:9735"    # P2P Lightning
      - "10109:10009"  # gRPC
      - "8180:8080"    # REST
      - "9911:9911"    # Watchtower server port
    volumes:
      - research_alice_data:/home/lnd/.lnd
      - ./lnd-alice/lnd-alice.conf:/home/lnd/.lnd/lnd.conf:ro
    environment:
      - LND_DATA=/home/lnd/.lnd
    command: >
      lnd
      --configfile=/home/lnd/.lnd/lnd.conf
      --bitcoind.rpcuser=bitcoinrpc
      --bitcoind.rpcpass=research_password
    healthcheck:
      test: ["CMD-SHELL", "curl -sf --insecure https://localhost:8080/v1/state > /dev/null"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # LND — Bob (Node B / Middle Hop + Watchtower Client)
  # ---------------------------------------------------------------------------
  lnd-bob:
    build:
      context: ./lnd
      dockerfile: Dockerfile
      args:
        LND_VERSION: ${LND_VERSION:-v0.20.1-beta}
    image: lnd:${LND_VERSION:-v0.20.1-beta}
    container_name: lnd-bob
    restart: unless-stopped
    depends_on:
      bitcoin-research:
        condition: service_healthy
    networks:
      - research_net
    ports:
      - "9836:9735"    # P2P Lightning
      - "10110:10009"  # gRPC
      - "8181:8080"    # REST
    volumes:
      - research_bob_data:/home/lnd/.lnd
      - ./lnd-bob/lnd-bob.conf:/home/lnd/.lnd/lnd.conf:ro
    environment:
      - LND_DATA=/home/lnd/.lnd
    command: >
      lnd
      --configfile=/home/lnd/.lnd/lnd.conf
      --bitcoind.rpcuser=bitcoinrpc
      --bitcoind.rpcpass=research_password
    healthcheck:
      test: ["CMD-SHELL", "curl -sf --insecure https://localhost:8080/v1/state > /dev/null"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # LND — Carol (Node C / Receiver + Watchtower Client)
  # ---------------------------------------------------------------------------
  lnd-carol:
    build:
      context: ./lnd
      dockerfile: Dockerfile
      args:
        LND_VERSION: ${LND_VERSION:-v0.20.1-beta}
    image: lnd:${LND_VERSION:-v0.20.1-beta}
    container_name: lnd-carol
    restart: unless-stopped
    depends_on:
      bitcoin-research:
        condition: service_healthy
    networks:
      - research_net
    ports:
      - "9837:9735"    # P2P Lightning
      - "10111:10009"  # gRPC
      - "8182:8080"    # REST
    volumes:
      - research_carol_data:/home/lnd/.lnd
      - ./lnd-carol/lnd-carol.conf:/home/lnd/.lnd/lnd.conf:ro
    environment:
      - LND_DATA=/home/lnd/.lnd
    command: >
      lnd
      --configfile=/home/lnd/.lnd/lnd.conf
      --bitcoind.rpcuser=bitcoinrpc
      --bitcoind.rpcpass=research_password
    healthcheck:
      test: ["CMD-SHELL", "curl -sf --insecure https://localhost:8080/v1/state > /dev/null"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # ThunderHub — Alice GUI (http://localhost:3000)
  # ---------------------------------------------------------------------------
  thunderhub-alice:
    build:
      context: ./thunderhub
      dockerfile: Dockerfile
      args:
        THUNDERHUB_VERSION: ${THUNDERHUB_VERSION:-v0.15.1}
    image: thunderhub:${THUNDERHUB_VERSION:-v0.15.1}
    container_name: thunderhub-alice
    user: "1001:1001"
    restart: unless-stopped
    depends_on:
      lnd-alice:
        condition: service_healthy
    networks:
      - research_net
    ports:
      - "3000:3001"    # ThunderHub UI — Alice
    volumes:
      - research_alice_data:/lnd/.lnd:ro
      - ./thunderhub/thubConfig-alice.yaml:/app/thubConfig.yaml:ro
    environment:
      - ACCOUNT_CONFIG_PATH=/app/thubConfig.yaml
      - HOST=0.0.0.0
      - PORT=3001
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # ThunderHub — Bob GUI (http://localhost:3001)
  # ---------------------------------------------------------------------------
  thunderhub-bob:
    build:
      context: ./thunderhub
      dockerfile: Dockerfile
      args:
        THUNDERHUB_VERSION: ${THUNDERHUB_VERSION:-v0.15.1}
    image: thunderhub:${THUNDERHUB_VERSION:-v0.15.1}
    container_name: thunderhub-bob
    user: "1001:1001"
    restart: unless-stopped
    depends_on:
      lnd-bob:
        condition: service_healthy
    networks:
      - research_net
    ports:
      - "3001:3001"    # ThunderHub UI — Bob
    volumes:
      - research_bob_data:/lnd/.lnd:ro
      - ./thunderhub/thubConfig-bob.yaml:/app/thubConfig.yaml:ro
    environment:
      - ACCOUNT_CONFIG_PATH=/app/thubConfig.yaml
      - HOST=0.0.0.0
      - PORT=3001
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # ThunderHub — Carol GUI (http://localhost:3002)
  # ---------------------------------------------------------------------------
  thunderhub-carol:
    build:
      context: ./thunderhub
      dockerfile: Dockerfile
      args:
        THUNDERHUB_VERSION: ${THUNDERHUB_VERSION:-v0.15.1}
    image: thunderhub:${THUNDERHUB_VERSION:-v0.15.1}
    container_name: thunderhub-carol
    user: "1001:1001"
    restart: unless-stopped
    depends_on:
      lnd-carol:
        condition: service_healthy
    networks:
      - research_net
    ports:
      - "3002:3001"    # ThunderHub UI — Carol
    volumes:
      - research_carol_data:/lnd/.lnd:ro
      - ./thunderhub/thubConfig-carol.yaml:/app/thubConfig.yaml:ro
    environment:
      - ACCOUNT_CONFIG_PATH=/app/thubConfig.yaml
      - HOST=0.0.0.0
      - PORT=3001
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
