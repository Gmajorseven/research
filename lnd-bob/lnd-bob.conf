# =============================================================================
# LND Configuration — Bob (Research Node B / Middle Hop)
# =============================================================================
# Bob is the ROUTING NODE (middle hop) in payment routing experiments.
# Bob uses the Watchtower CLIENT to register with Alice's tower — this is the
# key component for demonstrating fraud PREVENTION in your research.
#
# Topology:  Alice ──channel──► Bob ──channel──► Carol

[Application Options]
alias=Bob-Research
color=#FF5500

# Listening ports (Bob — different host ports in docker-compose)
listen=0.0.0.0:9735
rpclisten=0.0.0.0:10009
restlisten=0.0.0.0:8080
restcors=*

# Data paths
datadir=/home/lnd/.lnd/data
logdir=/home/lnd/.lnd/logs
tlscertpath=/home/lnd/.lnd/tls.cert
tlskeypath=/home/lnd/.lnd/tls.key
adminmacaroonpath=/home/lnd/.lnd/data/chain/bitcoin/testnet4/admin.macaroon

# ---- Watchtower CLIENT (Bob registers with Alice's tower) -------------------
# The tower stores encrypted breach-remedy transactions (justice txs).
# If Bob goes offline and someone broadcasts an old state, the tower sweeps
# the channel funds back to Bob automatically — this is fraud PREVENTION.
[WtClient]
wtclient.active=true
# Alice's tower address (resolved within Docker network)
wtclient.private-tower-uris=<ALICE_PUBKEY>@lnd-alice:9911

# ---- Bitcoin Backend --------------------------------------------------------
[Bitcoin]
bitcoin.active=1
bitcoin.testnet4=1
bitcoin.node=bitcoind

# ---- Bitcoind RPC Connection ------------------------------------------------
[Bitcoind]
bitcoind.rpchost=bitcoin-research:48332
bitcoind.rpcuser=bitcoinrpc
bitcoind.rpcpass=research_password
bitcoind.zmqpubrawblock=tcp://bitcoin-research:28332
bitcoind.zmqpubrawtx=tcp://bitcoin-research:28333

# ---- Routing ----------------------------------------------------------------
[Routing]
routing.assumechanvalid=true
