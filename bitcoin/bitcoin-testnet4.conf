# =============================================================================
# Bitcoin Core — Testnet4 Configuration (Research Environment)
# =============================================================================
# Used by docker-compose.yml for Lightning Network fraud-prevention research.
# Testnet4 is the current Bitcoin test network (replaced testnet3 in 2024).
# Note: requires Bitcoin Core 28.0 or later.

# ---- Network ----------------------------------------------------------------
testnet4=1

# ---- RPC Server -------------------------------------------------------------
server=1
rpcbind=0.0.0.0
rpcallowip=0.0.0.0/0
rpcuser=bitcoinrpc
rpcpassword=research_password
# testnet4 default RPC port
rpcport=48332

# ---- Connection -------------------------------------------------------------
maxconnections=25

# ---- Performance ------------------------------------------------------------
dbcache=256

# ---- Transaction Index (required by LND) ------------------------------------
txindex=1

# ---- ZeroMQ (required by LND) -----------------------------------------------
zmqpubrawblock=tcp://0.0.0.0:28332
zmqpubrawtx=tcp://0.0.0.0:28333

# ---- Logging ----------------------------------------------------------------
loglevel=2
