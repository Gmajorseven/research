# =============================================================================
# Bitcoin Core — Regtest Configuration (Research Environment)
# =============================================================================
# Used by docker-compose.research.yml for isolated LN fraud-prevention research.
# Regtest gives you full control: mine blocks instantly, no real funds.

# ---- Network ----------------------------------------------------------------
regtest=1

[regtest]
# ---- RPC Server -------------------------------------------------------------
server=1
rpcbind=0.0.0.0
rpcallowip=0.0.0.0/0
rpcuser=bitcoinrpc
rpcpassword=research_password
# regtest default RPC port
rpcport=18443

# ---- Connection -------------------------------------------------------------
maxconnections=10

# ---- Performance ------------------------------------------------------------
dbcache=256

# ---- Transaction Index (required by LND) ------------------------------------
txindex=1

# ---- ZeroMQ (required by LND) -----------------------------------------------
zmqpubrawblock=tcp://0.0.0.0:28332
zmqpubrawtx=tcp://0.0.0.0:28333

# ---- Logging ----------------------------------------------------------------
loglevel=info

# ---- Fallback fee (needed in regtest) ----------------------------------------
fallbackfee=0.0002
