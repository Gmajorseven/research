# =============================================================================
# LND Configuration — Alice (Research Node A)
# =============================================================================
# Alice is the SENDER in routing simulations and runs the Watchtower Server
# so that other nodes can register and be protected against channel fraud.
#
# Topology:  Alice ──channel──► Bob ──channel──► Carol
#                         routing path for research

[Application Options]
alias=Alice-Research
color=#00AAFF

# Listening ports (Alice)
listen=0.0.0.0:9735
rpclisten=0.0.0.0:10009
restlisten=0.0.0.0:8080
restcors=*

# Data paths
datadir=/home/lnd/.lnd/data
logdir=/home/lnd/.lnd/logs
tlscertpath=/home/lnd/.lnd/tls.cert
tlskeypath=/home/lnd/.lnd/tls.key
adminmacaroonpath=/home/lnd/.lnd/data/chain/bitcoin/regtest/admin.macaroon

# ---- Watchtower SERVER (Alice hosts the tower) ------------------------------
# Other nodes (Bob, Carol) register here to be protected from breach/fraud.
[Watchtower]
watchtower.active=true
watchtower.listen=0.0.0.0:9911
watchtower.externalip=lnd-alice:9911

# ---- Bitcoin Backend --------------------------------------------------------
[Bitcoin]
bitcoin.active=1
bitcoin.regtest=1
bitcoin.node=bitcoind

# ---- Bitcoind RPC Connection ------------------------------------------------
[Bitcoind]
bitcoind.rpchost=bitcoin-research:18443
bitcoind.rpcuser=bitcoinrpc
bitcoind.rpcpass=research_password
bitcoind.zmqpubrawblock=tcp://bitcoin-research:28332
bitcoind.zmqpubrawtx=tcp://bitcoin-research:28333

# ---- Routing ----------------------------------------------------------------
[Routing]
routing.assumechanvalid=true
